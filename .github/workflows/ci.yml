name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: cd backend && go mod download

      - name: Create dummy .env
        run: cp backend/.env.example backend/.env

      - name: Go Build check
        run: cd backend && go build -v ./...

      - name: Vet
        run: cd backend && go vet ./...

      - name: Test
        run: cd backend && go test -v ./...

  frontend:
    name: Frontend CI (${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # v2 is a zero-build HTML prototype with no lint/test — skip it in CI.
        version: [v1, v3]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/${{ matrix.version }}/package-lock.json

      - name: Install dependencies
        run: cd frontend/${{ matrix.version }} && npm install

      - name: Lint
        run: cd frontend/${{ matrix.version }} && npm run lint

      - name: Build check
        run: cd frontend/${{ matrix.version }} && npm run build

      - name: Test
        run: cd frontend/${{ matrix.version }} && npm test

  docs:
    name: Docs Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: docs

      - name: Build with VitePress
        run: pnpm run docs:build
        working-directory: docs
